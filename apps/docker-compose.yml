version: '3.8'

services:
  postgres:
    image: postgres:18-alpine
    container_name: crm-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin12345
      - POSTGRES_DB=crm
    networks:
      - crm-network
    ports:
      - '5432:5432'
    volumes:
      - db:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -d crm -U postgres -h localhost']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: crm-backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://postgres:admin12345@postgres:5432/crm?schema=public
      - PORT=5000
      - FRONTEND_URL=http://localhost:3000
    ports:
      - '5000:5000'
    networks:
      - crm-network
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    container_name: crm-frontend
    restart: always
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api # для браузера
      - API_URL=http://backend:5000/api
    ports:
      - '3000:3000'
    networks:
      - crm-network
    depends_on:
      - backend

networks:
  crm-network:
    driver: bridge

volumes:
  db:
